<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  <!-- Header Navbar -->
  <header class="bg-indigo-600 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <a routerLink="/" class="text-2xl font-bold tracking-tight flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" />
            </svg>
            AcademiaApp
          </a>
        </div>
        
        <!-- Menu deslogado -->
        <nav *ngIf="!authService.isLoggedIn()" class="flex space-x-4">
          <a routerLink="/login" class="hover:bg-indigo-500 px-3 py-2 rounded-md font-medium transition-colors">Login</a>
          <a routerLink="/cadastro" class="bg-white text-indigo-600 hover:bg-gray-100 px-3 py-2 rounded-md font-medium transition-colors shadow-sm">Cadastrar</a>
        </nav>

        <!-- Menu logado -->
        <nav *ngIf="authService.isLoggedIn()" class="flex space-x-4 items-center">
          <a routerLink="/treinos" class="hover:bg-indigo-500 px-3 py-2 rounded-md font-medium transition-colors">Meus Treinos</a>
          <button (click)="logout()" class="text-indigo-200 hover:text-white px-3 py-2 font-medium transition-colors cursor-pointer">Sair</button>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400 text-sm flex items-center justify-center">
        Desenvolvido com 
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500 mx-1" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
        </svg>
        para o GitHub
      </p>
      <p class="text-gray-500 text-xs mt-2">&copy; 2026 AcademiaApp. Todos os direitos reservados.</p>
    </div>
  </footer>
</div>
