<div class="min-h-screen bg-[#0B0F1A] flex flex-col font-sans text-white">
  <!-- Header Navbar -->
  <header class="bg-[#1c2333] text-white border-b border-slate-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row justify-between items-center py-4 sm:h-20 gap-4 sm:gap-0">
        <div class="flex items-center">
          <div class="bg-sky-500 p-1.5 sm:p-2 rounded-xl mr-3 shadow-lg shadow-sky-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <span class="text-xl sm:text-2xl font-black tracking-tighter text-white uppercase italic">Gym<span class="text-sky-500">Flow</span></span>
        </div>
        
        <!-- Menu deslogado -->
        <nav *ngIf="!authService.isLoggedIn()" class="flex items-center space-x-2 sm:space-x-4">
          <a routerLink="/login" class="hover:text-sky-400 px-2 sm:px-3 py-2 rounded-md font-bold transition-colors uppercase text-[10px] sm:text-sm tracking-widest">Login</a>
          <a routerLink="/cadastro" class="bg-sky-500 text-white hover:bg-sky-600 px-3 sm:px-5 py-2 rounded-xl font-bold transition-all shadow-lg shadow-sky-500/20 uppercase text-[10px] sm:text-sm tracking-widest">Cadastrar</a>
        </nav>

        <!-- Menu logado -->
        <nav *ngIf="authService.isLoggedIn()" class="flex items-center space-x-4 sm:space-x-6">
          <a routerLink="/treinos" class="text-sky-400 hover:text-sky-300 px-2 sm:px-3 py-2 rounded-md font-bold transition-colors uppercase text-[10px] sm:text-sm tracking-widest border border-sky-500/20 sm:border-none rounded-lg">Meus Treinos</a>
          <button (click)="logout()" class="text-slate-500 hover:text-white px-2 sm:px-3 py-2 font-bold transition-colors cursor-pointer uppercase text-[10px] sm:text-sm tracking-widest">Sair</button>
        </nav>
      </div>
    </div>
  </header>

  <!-- Conteúdo Principal -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="bg-[#1c2333] text-slate-500 py-10 mt-auto border-t border-slate-700">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <div class="flex items-center justify-center mb-4">
        <div class="bg-sky-500/10 p-1.5 rounded-lg mr-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="text-lg font-black tracking-tighter text-white uppercase italic">Gym<span class="text-sky-500">Flow</span></span>
      </div>
      <p class="text-slate-600 text-xs uppercase tracking-widest font-bold">&copy; 2026 GymFlow. Estilo & Performance.</p>
    </div>
  </footer>
</div>
