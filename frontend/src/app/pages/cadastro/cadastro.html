<div class="min-h-[70vh] flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-900">Crie sua conta</h2>
      <p class="text-gray-500 mt-2">Comece a gerenciar seus treinos hoje</p>
    </div>

    <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div *ngIf="errorMessage" class="bg-red-50 text-red-600 p-3 rounded-md text-sm">
        {{ errorMessage }}
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Nome completo</label>
        <input type="text" formControlName="nome"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"
          placeholder="Seu nome">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" formControlName="email"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"
          placeholder="seu@email.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Senha</label>
        <input type="password" formControlName="senha"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border"
          placeholder="Mínimo 6 caracteres">
      </div>

      <button type="submit" [disabled]="cadastroForm.invalid"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-indigo-300 transition-colors">
        Criar conta
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        Já tem uma conta?
        <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500">Faça login</a>
      </p>
    </div>
  </div>
</div>
