<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-white">Meus Treinos</h1>
    <button (click)="toggleForm()" class="bg-sky-500 text-white px-4 py-2 rounded-md hover:bg-sky-600 transition-colors shadow-lg shadow-sky-500/20 font-semibold">
      {{ mostrandoForm ? 'Cancelar' : '+ Novo Treino' }}
    </button>
  </div>

  <!-- Formulário de Criação -->
  <div *ngIf="mostrandoForm" class="bg-[#1c2333] p-6 rounded-xl shadow-xl mb-8 border border-slate-700">
    <h2 class="text-xl font-semibold mb-4 text-sky-400">
      {{ treinoEditando ? 'Editar Treino' : 'Criar Novo Treino' }}
    </h2>
    <form [formGroup]="treinoForm" (ngSubmit)="salvarTreino()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-400">Nome do Treino</label>
        <input type="text" formControlName="nome" class="mt-1 block w-full rounded-md bg-[#07090e] border-slate-700 text-white shadow-sm focus:border-sky-500 focus:ring-sky-500 p-2 border" placeholder="Ex: Treino A - Peito e Tríceps">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400">Descrição</label>
        <textarea formControlName="descricao" rows="3" class="mt-1 block w-full rounded-md bg-[#07090e] border-slate-700 text-white shadow-sm focus:border-sky-500 focus:ring-sky-500 p-2 border" placeholder="Detalhes do treino..."></textarea>
      </div>
      <div class="flex justify-end space-x-3 pt-2">
        <button type="button" (click)="toggleForm()" class="px-4 py-2 text-slate-400 bg-slate-800 rounded-md hover:bg-slate-700 transition-colors">Cancelar</button>
        <button type="submit" [disabled]="treinoForm.invalid" class="px-4 py-2 text-white bg-sky-500 rounded-md hover:bg-sky-600 disabled:bg-slate-700 disabled:text-slate-500 transition-colors shadow-lg shadow-sky-500/20">
          {{ treinoEditando ? 'Atualizar' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>

  <!-- Lista de Treinos -->
  <div *ngIf="treinos.length === 0 && !mostrandoForm" class="text-center py-12 bg-[#1c2333] rounded-xl shadow-sm border border-slate-700">
    <svg class="mx-auto h-12 w-12 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
    </svg>
    <h3 class="mt-2 text-sm font-medium text-white">Nenhum treino</h3>
    <p class="mt-1 text-sm text-slate-400">Comece criando um novo treino.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let treino of treinos" class="bg-[#1c2333] rounded-xl shadow-sm overflow-hidden hover:shadow-sky-500/10 hover:shadow-2xl transition-all border border-slate-700 flex flex-col">
      <div class="p-6 flex-grow">
        <h3 class="text-xl font-bold text-white mb-2">{{ treino.nome }}</h3>
        <p class="text-slate-400 text-sm mb-4 line-clamp-3">{{ treino.descricao }}</p>
      </div>
      <div class="bg-[#242c3d] px-6 py-4 flex justify-between items-center border-t border-slate-700">
        <a [routerLink]="['/treinos', treino.id]" class="text-sky-400 hover:text-sky-300 font-medium text-sm flex items-center">
          Ver Exercícios 
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </a>
        <div class="flex items-center space-x-2">
          <!-- Botão Editar -->
          <button (click)="iniciarEdicao(treino)" class="text-sky-400 hover:text-sky-300 bg-sky-500/10 p-2 rounded-full transition-colors hover:bg-sky-500/20" title="Editar Treino">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </button>
          <!-- Botão Excluir -->
          <button (click)="excluirTreino(treino.id!)" class="text-rose-500 hover:text-rose-400 bg-rose-500/10 p-2 rounded-full transition-colors hover:bg-rose-500/20" title="Excluir Treino">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
