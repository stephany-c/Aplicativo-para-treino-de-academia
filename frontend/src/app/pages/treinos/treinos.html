<div>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Meus Treinos</h1>
    <button (click)="toggleForm()" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors shadow-sm">
      {{ mostrandoForm ? 'Cancelar' : '+ Novo Treino' }}
    </button>
  </div>

  <!-- Formulário de Criação -->
  <div *ngIf="mostrandoForm" class="bg-white p-6 rounded-xl shadow-md mb-8 transition-all border border-gray-100">
    <h2 class="text-xl font-semibold mb-4 text-gray-800">
      {{ treinoEditando ? 'Editar Treino' : 'Criar Novo Treino' }}
    </h2>
    <form [formGroup]="treinoForm" (ngSubmit)="salvarTreino()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Nome do Treino</label>
        <input type="text" formControlName="nome" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="Ex: Treino A - Peito e Tríceps">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Descrição</label>
        <textarea formControlName="descricao" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="Detalhes do treino..."></textarea>
      </div>
      <div class="flex justify-end space-x-3 pt-2">
        <button type="button" (click)="toggleForm()" class="px-4 py-2 text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors">Cancelar</button>
        <button type="submit" [disabled]="treinoForm.invalid" class="px-4 py-2 text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:bg-indigo-300 transition-colors shadow-sm">
          {{ treinoEditando ? 'Atualizar' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>

  <!-- Lista de Treinos -->
  <div *ngIf="treinos.length === 0 && !mostrandoForm" class="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100">
    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
    </svg>
    <h3 class="mt-2 text-sm font-medium text-gray-900">Nenhum treino</h3>
    <p class="mt-1 text-sm text-gray-500">Comece criando um novo treino.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let treino of treinos" class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition-shadow border border-gray-100 flex flex-col">
      <div class="p-6 flex-grow">
        <h3 class="text-xl font-bold text-gray-900 mb-2">{{ treino.nome }}</h3>
        <p class="text-gray-600 text-sm mb-4 line-clamp-3">{{ treino.descricao }}</p>
      </div>
      <div class="bg-gray-50 px-6 py-4 flex justify-between items-center border-t border-gray-100">
        <a [routerLink]="['/treinos', treino.id]" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm flex items-center">
          Ver Exercícios 
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </a>
        <div class="flex items-center space-x-2">
          <!-- Botão Editar -->
          <button (click)="iniciarEdicao(treino)" class="text-indigo-500 hover:text-indigo-700 bg-indigo-50 p-2 rounded-full transition-colors hover:bg-indigo-100" title="Editar Treino">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </button>
          <!-- Botão Excluir -->
          <button (click)="excluirTreino(treino.id!)" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-full transition-colors hover:bg-red-100" title="Excluir Treino">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
