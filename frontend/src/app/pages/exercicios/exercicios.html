<div>
  <!-- Header do Treino -->
  <div class="mb-8">
    <a routerLink="/treinos" class="text-indigo-600 hover:text-indigo-800 flex items-center text-sm font-medium mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Voltar aos Treinos
    </a>
    
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex justify-between items-start">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">{{ treino?.nome || 'Carregando...' }}</h1>
        <p class="text-gray-600">{{ treino?.descricao }}</p>
      </div>
      <button (click)="toggleForm()" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors shadow-sm whitespace-nowrap">
        {{ mostrandoForm ? 'Cancelar' : '+ Novo Exercício' }}
      </button>
    </div>
  </div>

  <!-- Formulário de Criação -->
  <div *ngIf="mostrandoForm" class="bg-white p-6 rounded-xl shadow-md mb-8 transition-all border border-indigo-100">
    <h2 class="text-xl font-semibold mb-4 text-gray-800">Adicionar Exercício</h2>
    <form [formGroup]="exercicioForm" (ngSubmit)="salvarExercicio()" class="grid grid-cols-1 md:grid-cols-12 gap-4">
      <div class="md:col-span-6">
        <label class="block text-sm font-medium text-gray-700">Nome do Exercício</label>
        <input type="text" formControlName="nome" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="Ex: Supino Reto">
      </div>
      <div class="md:col-span-3">
        <label class="block text-sm font-medium text-gray-700">Séries</label>
        <input type="number" formControlName="series" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" min="1">
      </div>
      <div class="md:col-span-3">
        <label class="block text-sm font-medium text-gray-700">Repetições</label>
        <input type="number" formControlName="repeticoes" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" min="1">
      </div>
      <div class="md:col-span-12 flex justify-end space-x-3 pt-2">
        <button type="button" (click)="toggleForm()" class="px-4 py-2 text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Cancelar</button>
        <button type="submit" [disabled]="exercicioForm.invalid" class="px-4 py-2 text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:bg-indigo-300">Adicionar</button>
      </div>
    </form>
  </div>

  <!-- Tabela de Exercícios -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
      <h3 class="text-lg font-medium text-gray-900">Lista de Exercícios</h3>
    </div>
    
    <div *ngIf="exercicios.length === 0" class="text-center py-12">
      <p class="text-gray-500">Nenhum exercício adicionado a este treino.</p>
    </div>

    <ul *ngIf="exercicios.length > 0" class="divide-y divide-gray-200">
      <li *ngFor="let exercicio of exercicios" class="px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
        <div class="flex items-center">
          <div class="flex-shrink-0 h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center">
            <span class="text-indigo-600 font-bold">{{ exercicio.series }}x</span>
          </div>
          <div class="ml-4">
            <p class="text-lg font-medium text-gray-900">{{ exercicio.nome }}</p>
            <p class="text-sm text-gray-500">{{ exercicio.series }} séries de {{ exercicio.repeticoes }} repetições</p>
          </div>
        </div>
        <button (click)="excluirExercicio(exercicio.id!)" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-full transition-colors hover:bg-red-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </li>
    </ul>
  </div>
</div>
