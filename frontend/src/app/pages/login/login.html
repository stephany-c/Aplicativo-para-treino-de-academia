<!-- Fundo com imagem e overlay escuro -->
<div class="fixed inset-0 bg-auth -z-10"></div>

<div class="min-h-[calc(100vh-80px)] flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-[#1c2333]/90 backdrop-blur-md rounded-2xl shadow-2xl p-10 border border-slate-700">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-black text-white tracking-tight italic uppercase">Gym<span class="text-sky-500">Flow</span></h2>
      <p class="text-slate-400 mt-2 font-medium">Faça login para acessar seus treinos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      @if (errorMessage) {
        <div class="bg-rose-500/10 border border-rose-500/20 text-rose-500 p-4 rounded-xl text-sm font-medium">
          {{ errorMessage }}
        </div>
      }

      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Email</label>
        <input type="email" formControlName="email"
          class="block w-full rounded-xl !bg-[#07090e] border-slate-700 text-white shadow-sm focus:border-sky-500 focus:ring-sky-500 p-4 border transition-all"
          placeholder="seu@email.com">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Senha</label>
        <input type="password" formControlName="senha"
          class="block w-full rounded-xl !bg-[#07090e] border-slate-700 text-white shadow-sm focus:border-sky-500 focus:ring-sky-500 p-4 border transition-all"
          placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-lg shadow-sky-500/20 text-sm font-bold uppercase tracking-widest text-white bg-sky-500 hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:bg-slate-800 disabled:text-slate-600 transition-all">
        Entrar
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-sm text-slate-500 font-medium">
        Ainda não tem conta?
        <a routerLink="/cadastro" class="font-bold text-sky-400 hover:text-sky-300 transition-colors ml-1">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
