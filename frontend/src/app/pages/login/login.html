<!-- Fundo com imagem e overlay escuro -->
<div class="fixed inset-0 bg-auth -z-10"></div>

<div class="min-h-[calc(100vh-80px)] flex items-center justify-center p-4">
  <div
    class="max-w-md w-full bg-[#1c2333]/90 backdrop-blur-md rounded-2xl shadow-2xl p-6 sm:p-10 border border-slate-700">
    <div class="text-center mb-10">
      <h2 class="text-3xl font-black text-white tracking-tight italic uppercase">Gym<span
          class="text-sky-500">Flow</span></h2>
      <p class="text-slate-400 mt-2 font-medium">Faça login para acessar seus treinos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      @if (errorMessage) {
      <div class="bg-rose-500/10 border border-rose-500/20 text-rose-500 p-4 rounded-xl text-sm font-medium">
        {{ errorMessage }}
      </div>
      }

      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Email</label>
        <input type="email" formControlName="email"
          class="block w-full rounded-xl !bg-[#07090e] border-slate-700 text-white shadow-sm focus:border-sky-500 focus:ring-sky-500 p-4 border transition-all"
          placeholder="seu@email.com">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Senha</label>
        <div class="relative">
          <input [type]="showSenha ? 'text' : 'password'" formControlName="senha"
            class="block w-full rounded-xl !bg-[#07090e] border-slate-700 text-white shadow-sm focus:border-sky-500 focus:ring-sky-500 p-4 pr-12 border transition-all"
            placeholder="••••••••">
          <button type="button" (click)="showSenha = !showSenha"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-sky-400 transition-colors">
            @if (showSenha) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-lg shadow-sky-500/20 text-sm font-bold uppercase tracking-widest text-white bg-sky-500 hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:bg-slate-800 disabled:text-slate-600 transition-all">
        Entrar
      </button>
    </form>


    <div class="mt-8 text-center">
      <p class="text-sm text-slate-500 font-medium">
        Ainda não tem conta?
        <a routerLink="/cadastro"
          class="font-bold text-sky-400 hover:text-sky-300 transition-colors ml-1">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
